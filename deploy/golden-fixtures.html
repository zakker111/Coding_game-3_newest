<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nowt – Golden Fixtures Generator</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        font-family: ui-monospace, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        padding: 16px;
        line-height: 1.4;
      }
      pre {
        background: #0b0f17;
        color: #e2e8f0;
        padding: 12px;
        border-radius: 8px;
        overflow: auto;
        white-space: pre-wrap;
      }
      .err {
        color: #fecaca;
      }
    </style>
  </head>
  <body>
    <h1>Golden Fixtures Generator</h1>
    <p>
      Generates the JSON content for <code>packages/engine/test/golden/fixtures/*.json</code> using the deployed
      engine + example bots.
    </p>
    <pre id="out">Running…</pre>

    <script type="module">
      import { compileBotSource, runMatchToReplay } from './engine/src/index.js'
      import { EXAMPLE_BOTS } from './workshop/exampleBots.js'

      const out = document.getElementById('out')

      function stableStringify(value) {
        return JSON.stringify(stableClone(value)) ?? 'null'
      }

      function stableClone(value) {
        if (value == null) return value
        if (Array.isArray(value)) return value.map(stableClone)
        if (typeof value === 'object') {
          const keys = Object.keys(value).sort()
          const o = {}
          for (const k of keys) o[k] = stableClone(value[k])
          return o
        }
        return value
      }

      async function sha256Hex(s) {
        const data = new TextEncoder().encode(s)
        const digest = await crypto.subtle.digest('SHA-256', data)
        const bytes = new Uint8Array(digest)
        let hex = ''
        for (const b of bytes) hex += b.toString(16).padStart(2, '0')
        return hex
      }

      function parseLoadoutFromSourceHeader(sourceText) {
        const lines = String(sourceText || '')
          .replace(/\r\n?/g, '\n')
          .split('\n')

        const loadout = [null, null, null]

        let headerCommentLinesSeen = 0
        let sawDirective = false

        for (const line of lines) {
          const trimmed = line.trim()
          if (!trimmed) continue
          if (!trimmed.startsWith(';')) break

          headerCommentLinesSeen++

          const m = trimmed.match(/^;\s*@slot([123])\s*[:=]?\s*(\S+)\s*$/i)
          if (m) {
            sawDirective = true
            const slot = Number(m[1])
            const raw = String(m[2] || '')
              .trim()
              .toUpperCase()

            if (slot < 1 || slot > 3) continue

            if (raw === 'EMPTY' || raw === 'NONE') loadout[slot - 1] = null
            else if (raw === 'BULLET' || raw === 'SAW' || raw === 'SHIELD' || raw === 'ARMOR' || raw === 'GRENADE') loadout[slot - 1] = raw
            else loadout[slot - 1] = null
          }

          if (headerCommentLinesSeen >= 3) break
        }

        if (!sawDirective) return [null, null, null]
        return loadout
      }

      function buildMatchBotsFromSources(sourceTexts) {
        const SLOT_IDS = ['BOT1', 'BOT2', 'BOT3', 'BOT4']
        if (!Array.isArray(sourceTexts) || sourceTexts.length !== 4) {
          throw new Error(`expected 4 bot sources; got: ${JSON.stringify(sourceTexts)}`)
        }

        return SLOT_IDS.map((slotId, i) => ({
          slotId,
          sourceText: sourceTexts[i],
          loadout: parseLoadoutFromSourceHeader(sourceTexts[i]),
        }))
      }

      function stripBotsSourceText(bots) {
        return (bots ?? []).map((b) => {
          if (!b || typeof b !== 'object') return b
          if (!('sourceText' in b)) return b
          const { sourceText: _sourceText, ...rest } = b
          return rest
        })
      }

      async function hashReplayCore(replay) {
        const core = {
          schemaVersion: replay.schemaVersion,
          rulesetVersion: replay.rulesetVersion,
          matchSeed: replay.matchSeed,
          tickCap: replay.tickCap,
          ticksPerSecond: replay.ticksPerSecond,
          bots: stripBotsSourceText(replay.bots),
          state: replay.state,
          events: replay.events,
        }
        return sha256Hex(stableStringify(core))
      }

      async function hashTicks(arr) {
        const out = []
        for (const v of arr) out.push(await sha256Hex(stableStringify(v)))
        return out
      }

      function stablePrettyJson(obj) {
        return JSON.stringify(JSON.parse(stableStringify(obj)), null, 2)
      }

      function getExampleBotSource(n) {
        const k = `bot${n}`
        const b = EXAMPLE_BOTS[k]
        if (!b || typeof b.sourceText !== 'string') throw new Error(`missing EXAMPLE_BOTS.${k}.sourceText`)
        return b.sourceText
      }

      async function buildScenario({ name, seed, tickCap, botNums }) {
        const sources = botNums.map((n) => getExampleBotSource(n))

        for (let i = 0; i < sources.length; i++) {
          const compiled = compileBotSource(sources[i])
          const errs = compiled?.errors ?? []
          if (errs.length) {
            throw new Error(`expected bot${botNums[i]} to compile; got errors: ${JSON.stringify(errs)}`)
          }
        }

        const bots = buildMatchBotsFromSources(sources)

        const replay = runMatchToReplay({ seed, tickCap, bots })

        const expectedLen = replay.tickCap + 1
        if (replay.state.length !== expectedLen) throw new Error(`expected replay.state length ${expectedLen}, got ${replay.state.length}`)
        if (replay.events.length !== expectedLen) throw new Error(`expected replay.events length ${expectedLen}, got ${replay.events.length}`)

        return {
          name,
          params: { seed, tickCap: replay.tickCap, bots: [...botNums] },
          coreReplaySha256: await hashReplayCore(replay),
          stateTickSha256: await hashTicks(replay.state),
          eventsTickSha256: await hashTicks(replay.events),
        }
      }

      const scenarios = [
        { name: 'examples_smoke_seed123', seed: 123, tickCap: 50, botNums: [0, 1, 2, 3] },
        { name: 'examples_patrol_seed456', seed: 456, tickCap: 80, botNums: [1, 2, 3, 0] },
        { name: 'modules_powerups_seed999', seed: 999, tickCap: 120, botNums: [0, 5, 6, 4] },
        { name: 'modules_saw_rush_seed777', seed: 777, tickCap: 90, botNums: [4, 6, 5, 0] },
      ]

      try {
        const fixtures = {}

        for (const s of scenarios) {
          fixtures[`${s.name}.json`] = await buildScenario(s)
        }

        out.textContent = stablePrettyJson({ fixtures })
      } catch (err) {
        const msg = err instanceof Error ? err.stack || err.message : String(err)
        out.textContent = `ERROR\n${msg}`
        out.classList.add('err')
      }
    </script>
  </body>
</html>
